<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#080b0f" />
  <meta name="description" content="A scratchpad for exploring autonomous AI — agents, tool use, and multi-step reasoning." />
  <meta property="og:title" content="ai-playground — mxrsoon" />
  <meta property="og:description" content="A scratchpad for exploring autonomous AI." />
  <meta property="og:url" content="https://mxrsoon.github.io/ai-playground" />
  <title>ai-playground — mxrsoon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b0f;
      --surface: #0e1318;
      --border: #1c2530;
      --glow: #00e5ff;
      --glow-dim: rgba(0, 229, 255, 0.08);
      --glow-mid: rgba(0, 229, 255, 0.18);
      --text: #c8d8e4;
      --text-dim: #556070;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOcta[...]
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    header {
      padding: 3rem 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.6s ease both;
    }

    .logo {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .logo span {
      color: var(--accent);
    }

    nav a {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--accent); }

    .hero {
      padding: 7rem 0 5rem;
      position: relative;
      overflow: hidden;
    }

    .hero-tag {
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .hero-tag::before {
      content: '';
      display: block;
      width: 1.5rem;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      font-family: var(--sans);
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      color: #fff;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    h1 .dim { color: var(--text-dim); }
    h1 .glow-word {
      color: var(--accent);
      text-shadow: 0 0 40px rgba(0,229,255,0.4), 0 0 80px rgba(0,229,255,0.15);
    }

    .hero-sub {
      margin-top: 2rem;
      max-width: 500px;
      font-size: 0.85rem;
      line-height: 1.8;
      color: var(--text-dim);
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .hero-actions {
      margin-top: 3rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.4rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      font-weight: 700;
      border: 1px solid var(--accent);
    }

    .btn-primary:hover {
      background: transparent;
      color: var(--accent);
      box-shadow: 0 0 20px var(--glow-mid);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .terminal-wrap {
      margin-top: 5rem;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .terminal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,229,255,0.04), 0 24px 80px rgba(0,0,0,0.5);
    }

    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1rem;
      background: #0b1015;
      border-bottom: 1px solid var(--border);
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #febc2e; }
    .dot-g { background: #28c840; }

    .terminal-title {
      flex: 1;
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .terminal-body {
      padding: 1.5rem;
      font-size: 0.78rem;
      line-height: 2;
      overflow-x: auto;
    }

    .line { display: flex; gap: 0.8rem; }
    .prompt { color: var(--accent); user-select: none; }
    .cmd { color: #fff; }
    .cmt { color: var(--text-dim); }
    .out { color: #7ec8a0; padding-left: 1.6rem; }
    .blank { height: 0.8rem; }

    .cursor {
      display: inline-block;
      width: 8px; height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    .section {
      padding: 5rem 0;
      border-top: 1px solid var(--border);
    }

    .section-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }
